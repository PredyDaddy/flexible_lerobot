# JZRobot 三路 RealSense 采集配置
# 用途：
# 1. 固定双臂 JZRobot 的 ROS2 topic 和 joint 名称
# 2. 固定胸部 / 左臂 / 右臂三路 RealSense 序列号
# 3. 作为 record / replay / visualize 的统一机器人配置模板

type: jz_robot
id: jz_robot_three_realsense

left_joint_names:
  - left_joint1
  - left_joint2
  - left_joint3
  - left_joint4
  - left_joint5
  - left_joint6
  - left_joint7

right_joint_names:
  - right_joint1
  - right_joint2
  - right_joint3
  - right_joint4
  - right_joint5
  - right_joint6
  - right_joint7

left_joint_state_topic: arm_left/joint_states
right_joint_state_topic: arm_right/joint_states

# 默认走 SmoothMotionEngine 输入端
left_position_command_topic: telecon/arm_left/joint_commands_input
right_position_command_topic: telecon/arm_right/joint_commands_input
use_gripper: true
left_gripper_state_topic: left_gripper/gripper_status
right_gripper_state_topic: right_gripper/gripper_status
left_gripper_command_topic: left_gripper/gripper_commands
right_gripper_command_topic: right_gripper/gripper_commands

state_timeout_s: 0.2
qos_depth: 10

# 录制阶段默认由外部 teleop / VR / 上位机发布命令
# LeRobot 只读取状态和相机并记录数据，不回写控制命令，避免形成闭环。
use_external_commands: true

max_relative_target: null

cameras:
  chest:
    type: intelrealsense
    serial_number_or_name: "348522073175"
    fps: 30
    width: 640
    height: 480
    use_depth: false
    warmup_s: 1

  left_arm:
    type: intelrealsense
    serial_number_or_name: "230422272306"
    fps: 30
    width: 640
    height: 480
    use_depth: false
    warmup_s: 1

  right_arm:
    type: intelrealsense
    serial_number_or_name: "230322272819"
    fps: 30
    width: 640
    height: 480
    use_depth: false
    warmup_s: 1
