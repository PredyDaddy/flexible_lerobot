# JZRobot 平滑模式配置
# 用途：
# 1. 集中保存机器人类型、双臂 topic、joint 名称、相机参数
# 2. 避免每次启动都手写一长串 --robot.* 参数
# 3. 作为 teleoperate / record / replay 的机器人配置模板

type: jz_robot
id: jz_robot_dual_arm

left_joint_names:
  - left_joint1
  - left_joint2
  - left_joint3
  - left_joint4
  - left_joint5
  - left_joint6
  - left_joint7

right_joint_names:
  - right_joint1
  - right_joint2
  - right_joint3
  - right_joint4
  - right_joint5
  - right_joint6
  - right_joint7

left_joint_state_topic: arm_left/joint_states
right_joint_state_topic: arm_right/joint_states

# 平滑模式：LeRobot 发到 SmoothMotionEngine 输入端
left_position_command_topic: telecon/arm_left/joint_commands_input
right_position_command_topic: telecon/arm_right/joint_commands_input

state_timeout_s: 0.2
qos_depth: 10

# 如果动作来自外部 teleop（例如 jz_command_teleop 监听的同一组 ROS2 topic），
# 这里必须打开，避免 LeRobot 再次往同一 topic 回写形成闭环自激。
use_external_commands: true

# 如果你希望在 LeRobot 侧再做一次目标限幅，可以改成正数；默认关闭，主要依赖 SmoothMotionEngine 自身保护。
max_relative_target: null

cameras:
  front:
    type: intelrealsense
    serial_number_or_name: REPLACE_WITH_REALSENSE_SERIAL
    fps: 30
    width: 640
    height: 480
    use_depth: false
